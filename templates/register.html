<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2TR8DE Synthetic Engine · Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <div class="brand-mark">SE</div>
        <div>
          <h1>Create Access Request</h1>
          <p>2TR8DE Synthetic Engine</p>
        </div>
      </div>

      <div class="login-copy">
        <span>STUDENT REGISTRATION</span>
        <h2>Request Private Access</h2>
        <p>Create your account. Your access will remain pending until approved by the 2TR8DE team.</p>
      </div>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form class="login-form" method="POST" action="/register">
        <label>
          Full Name
          <input type="text" name="name" placeholder="Your name" required>
        </label>

        <label>
          Username
          <input type="text" name="username" placeholder="your_username" required>
        </label>

        <label>
          Password
          <input type="password" name="password" placeholder="Create password" required>
        </label>

        <button type="submit">Submit Access Request</button>
      </form>

      <div class="login-note">
        Already have an account?
        <a href="/login">Login here</a>
        <br>
        Want to check approval?
        <a href="/status">Check status</a>
      </div>
    </section>
  </main>
</body>
</html>
